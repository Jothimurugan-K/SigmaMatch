services:
  - type: web
    name: sigmamatch
    runtime: python
    buildCommand: cd backend && pip install .
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: MATCH_TIMEOUT
        value: "30"
